<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie SPA - TMDB Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Media Center SPA</h1>
    <nav>
        <button id="btn-search-view">Search Engine</button>
        <button id="btn-popular">Popular Items</button>
        <button id="btn-bookshelf">Trending</button>
    </nav>
</header>

<main id="app">
    <div class="controls">
        <button id="grid-mode">Grid View</button>
        <button id="list-mode">List View</button>
    </div>

    <section id="search-section">
        <div id="search-bar">
            <input type="text" id="query" placeholder="Search movies (e.g. Batman)..." />
            <button id="btn-do-search">Search</button>
        </div>
        <div id="search-results" class="grid-view">
            <p style="text-align:center;">Use the bar above to find movies.</p>
        </div>
    </section>

    <section id="collection-section" style="display:none;">
        <h2 id="collection-title" style="text-align:center;">Collection</h2>
        <div id="collection-results" class="grid-view"></div>
    </section>

    <div class="pagination-container">
        <button id="prev-page">Previous</button>
        <span id="page-info">Page 1</span>
        <button id="next-page">Next</button>
    </div>

    <div id="details-panel" style="display:none;">
        <button id="close-details">Close ✖</button>
        <div id="details-content"></div>
    </div>
</main>

<script id="movie-card-template" type="x-tmpl-mustache">
{{#items}}
<div class="movie-card" data-id="{{id}}">
    <img src="{{poster}}" alt="{{title}}">
    <div class="card-text">
        <h3>{{title}}</h3>
        <p>Year: {{year}} | ⭐ {{rating}}</p>
    </div>
</div>
{{/items}}
</script>

<script id="detail-template" type="x-tmpl-mustache">
<div class="detail-display">
    <img src="{{poster}}" class="detail-poster">
    <div class="detail-text">
        <h2>{{title}}</h2>
        <p><strong>Release Date:</strong> {{year}}</p>
        <p><strong>Overview:</strong> {{description}}</p>
        <div class="extra-metadata">
            <p><strong>Original Language:</strong> {{language}}</p>
            <p><strong>Popularity:</strong> {{popularity}}</p>
            <p><strong>Rating:</strong> ⭐ {{rating}}</p>
        </div>
    </div>
</div>
</script>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/4.2.0/mustache.min.js"></script>
<script src="app.js"></script>

</body>
</html>
