<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Center - Milestone 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Movie & TV Series Center</h1>
    <nav>
        <button id="btn-popular">Popular Collection</button>
        <button id="btn-search-view">Open Search Bar</button>
    </nav>
</header>

<hr>

<main id="app">
    <div id="search-bar" style="display:none; text-align: center; padding: 20px;">
        <input type="text" id="query" placeholder="Search movies or shows..." />
        <button id="btn-do-search">Search Now</button>
    </div>

    <div class="controls">
        <button id="grid-mode">Grid View</button>
        <button id="list-mode">List View</button>
    </div>

    <hr>

    <div id="main-container" class="grid-view">
        <p style="text-align:center;">Initializing application...</p>
    </div>

    <hr>

    <div id="details-panel" style="display:none;">
        <button id="close-details" style="float:right;">Close ✖</button>
        <div id="details-content">
            </div>
    </div>
</main>

<script id="movie-card-template" type="x-tmpl-mustache">
{{#items}}
<div class="movie-card" data-id="{{id}}">
    <img src="{{poster}}" alt="{{title}}">
    <div class="info">
        <h3>{{title}}</h3>
        <p><strong>Rating:</strong> {{rating}}</p>
    </div>
</div>
{{/items}}
</script>

<script id="detail-template" type="x-tmpl-mustache">
<div class="detail-flex" style="display: flex; gap: 30px; padding: 20px;">
    <img src="{{poster}}" style="max-width: 250px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    <div class="text-content">
        <h2 style="color: #557a95;">{{title}}</h2>
        <hr>
        <div class="summary-box">
            {{{description}}} </div>
        <p><strong>Language:</strong> {{language}}</p>
        <p><strong>Average Rating:</strong> {{rating}} / 10</p>
    </div>
</div>
</script>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/4.2.0/mustache.min.js"></script>
<script src="app.js"></script>

</body>
</html>
