<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie SPA - Milestone 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Movie Center</h1>
    <nav>
        <button id="btn-popular">Populares</button>
        <button id="btn-search-view">Buscador</button>
    </nav>
</header>

<main id="app">

    <!-- BUSCADOR -->
    <div id="search-bar" style="display:none; margin: 20px;">
        <input type="text" id="query" placeholder="Busca libros..." />
        <button id="btn-do-search">Buscar</button>
    </div>

    <!-- CONTROLES -->
    <div class="controls">
        <button id="grid-mode">Grid</button>
        <button id="list-mode">Lista</button>
    </div>

    <!-- RESULTADOS -->
    <div id="search-results" class="grid-view"></div>
    <div id="collection-results" class="grid-view" style="display:none;"></div>

    <!-- PAGINACIÓN -->
    <div class="pagination-container">
        <button id="prev-page">Anterior</button>
        <span id="page-info">Página 1</span>
        <button id="next-page">Siguiente</button>
    </div>

    <!-- DETALLES -->
    <div id="details-panel" style="display:none;">
        <button id="close-details">Cerrar ✖</button>
        <div id="details-content"></div>
    </div>

</main>

<!-- TEMPLATE CARDS -->
<script id="movie-card-template" type="x-tmpl-mustache">
{{#movies}}
<div class="movie-card" data-id="{{id}}">
    <img src="{{poster_path}}" alt="{{title}}">
    <div class="info">
        <h3>{{title}}</h3>
        <p>Rating: {{vote_average}}</p>
    </div>
</div>
{{/movies}}
</script>

<!-- TEMPLATE DETALLE -->
<script id="detail-template" type="x-tmpl-mustache">
<div class="detail">
    <img src="{{poster_path}}">
    <h2>{{title}}</h2>
    <p>{{description}}</p>
    <p><strong>Rating:</strong> {{rating}}</p>
    <p><strong>Idioma:</strong> {{language}}</p>
</div>
</script>

<!-- LIBRERÍAS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/4.2.0/mustache.min.js"></script>

<script src="app.js"></script>

</body>
</html>
